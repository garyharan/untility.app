<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untility.app</title>
    <link rel="icon" href="favicon-light.png" media="(prefers-color-scheme: light)">
    <link rel="icon" href="favicon-dark.png" media="(prefers-color-scheme: dark)">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Untility</h1>
        <p>Beautiful event countdown widgets for your iPhone home screen and lock screen.</p>
        <p style="margin-top: 2rem; font-size: 1rem; opacity: 0.8;">Track the days until your most important moments with customizable themes and elegant design.</p>
    </div>
</body>
</html>
