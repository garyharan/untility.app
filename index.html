<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Untility.app</title>
    <link
      rel="icon"
      href="favicon-light.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      href="favicon-dark.png"
      media="(prefers-color-scheme: dark)"
    />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        transition: background-color 0.3s ease;
      }
      @media (prefers-color-scheme: light) {
        body {
          background-color: #ccc;
          color: #333;
        }
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #333;
          color: white;
        }
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 480px;
        width: 100%;
      }
      .app-icon {
        width: 120px;
        height: 120px;
        border-radius: 26.67%;
        margin: 0 auto 2rem;
        display: block;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      }
      @media (prefers-color-scheme: light) {
        .app-icon-dark {
          display: none;
        }
        .app-icon-light {
          display: block;
        }
      }
      @media (prefers-color-scheme: dark) {
        .app-icon-dark {
          display: block;
        }
        .app-icon-light {
          display: none;
        }
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      p {
        font-size: 1.2rem;
        opacity: 0.9;
      }
      a {
        text-decoration: none;
        transition: opacity 0.2s ease;
      }
      a:hover {
        opacity: 0.7;
      }
      @media (prefers-color-scheme: light) {
        a {
          color: #0066cc;
        }
      }
      @media (prefers-color-scheme: dark) {
        a {
          color: #66b3ff;
        }
      }
      .app-store-badge {
        display: inline-block;
        margin-top: 2rem;
      }
      .app-store-badge img {
        height: 52px;
        width: auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="favicon-light.png"
        alt="Untility App Icon"
        class="app-icon app-icon-light"
      />
      <img
        src="favicon-dark.png"
        alt="Untility App Icon"
        class="app-icon app-icon-dark"
      />
      <h1>Untility</h1>
      <p>Beautiful countdown widgets for life's important events.</p>
      <a
        href="https://apps.apple.com/ca/app/untility-timeline-widgets/id6760127206"
        class="app-store-badge"
        target="_blank"
        rel="noopener"
      >
        <img
          src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg"
          alt="Download on the App Store"
        />
      </a>
      <div
        style="
          margin-top: 3rem;
          font-size: 0.75rem;
          opacity: 0.5;
          display: flex;
          flex-direction: column;
          gap: 0.5rem;
          align-items: center;
        "
      >
        <a
          href="mailto:gary.haran@gmail.com?subject=Untility.app%20support%20question"
          >Email Support</a
        >
        <a href="terms.html">Terms of Service</a>
        <a href="privacy.html">Privacy Policy</a>
      </div>
    </div>
  </body>
</html>
